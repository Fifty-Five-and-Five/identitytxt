name: Deploy to Firebase

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/976565588211/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@identitytxt.iam.gserviceaccount.com

      - name: Deploy to Firebase
        run: npx firebase-tools@latest deploy --project identitytxt --non-interactive --force
