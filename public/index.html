<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>identity.txt</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <img src="/assets/icon.svg" alt="55&5" class="logo">
      <h1>identity.txt</h1>
      <p>A voice interview that builds your personal profile. Talk naturally, get an identity.txt that tells AI tools who you are.</p>
      <form id="login-form">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" autofocus>
          <div class="error-msg" id="error">Incorrect password</div>
        </div>
        <button type="submit" class="btn btn-primary">Sign in</button>
      </form>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
